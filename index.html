<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>ODD ANIMAL OUT</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #unity-container {
        position: relative;
        /* サイズは JS で 9:16 に設定 */
      }

      #unity-canvas {
        display: block;
        background: #231F20;
      }

      /* ローディングバー */
      #unity-loading-bar {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        width: 60%;
        display: none;
      }
      #unity-progress-bar-empty {
        width: 100%; height: 10px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
      }
      #unity-progress-bar-full {
        width: 0%; height: 100%;
        background: #4caf50;
        border-radius: 5px;
        transition: width 0.15s;
      }

      /* エラー・警告バナー */
      #unity-warning {
        position: absolute;
        left: 50%; top: 5%;
        transform: translateX(-50%);
        background: white;
        padding: 10px;
        display: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      // ── 9:16 縦長レイアウト（ウィンドウ比に関わらず固定）──────────────
      const ASPECT = 9 / 16;

      function resizeCanvas() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let w, h;
        if (vw / vh <= ASPECT) {
          // ウィンドウが縦長 or ちょうど 9:16 → 横幅いっぱいに合わせる
          w = vw;
          h = vw / ASPECT;
        } else {
          // ウィンドウが横長 → 高さいっぱいに合わせる（左右に黒帯）
          h = vh;
          w = vh * ASPECT;
        }
        const c = document.getElementById('unity-container');
        const cv = document.getElementById('unity-canvas');
        c.style.width  = cv.style.width  = Math.round(w) + 'px';
        c.style.height = cv.style.height = Math.round(h) + 'px';
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // ── エラーバナー ────────────────────────────────────────────────────
      function unityShowBanner(msg, type) {
        var banner = document.querySelector('#unity-warning');
        var div = document.createElement('div');
        div.innerHTML = msg;
        if (type === 'error')   div.style.cssText = 'background:red;padding:8px;';
        if (type === 'warning') div.style.cssText = 'background:yellow;padding:8px;';
        banner.appendChild(div);
        banner.style.display = 'block';
        if (type !== 'error') {
          setTimeout(function() {
            banner.removeChild(div);
            if (!banner.children.length) banner.style.display = 'none';
          }, 5000);
        }
      }

      // ── Unity ローダー起動 ──────────────────────────────────────────────
      var buildUrl = 'Build';
      var config = {
        arguments: [],
        dataUrl:            buildUrl + '/docs.data',
        frameworkUrl:       buildUrl + '/docs.framework.js',
        codeUrl:            buildUrl + '/docs.wasm',
        streamingAssetsUrl: 'StreamingAssets',
        companyName:        'DefaultCompany',
        productName:        'ODD ANIMAL OUT',
        productVersion:     '0.1.0',
        showBanner:         unityShowBanner,
      };

      document.querySelector('#unity-loading-bar').style.display = 'block';

      var script = document.createElement('script');
      script.src = buildUrl + '/docs.loader.js';
      script.onload = function() {
        createUnityInstance(
          document.querySelector('#unity-canvas'),
          config,
          function(progress) {
            document.querySelector('#unity-progress-bar-full').style.width =
              (100 * progress) + '%';
          }
        ).then(function(unityInstance) {
          document.querySelector('#unity-loading-bar').style.display = 'none';
        }).catch(function(msg) {
          alert(msg);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
